name: dummy-telegram
prefect-version: 3.x

# --- FORCE THIS TO BE BLANK ---
# This stops Windows from injecting "D:\dev" into the deployment steps
# Force all automatic path discovery to turn off
build: []
push: []
pull: []

deployments:
- name: "dummy-telegram"
  entrypoint: "core/workers/dummy_telegram.py:my_docker_flow" # Your root file and flow function
  work_pool:
    name: "proxmox-process-pool" # Must match your systemd worker's pool
  
  # 2. FORCE the path to match your VM's project folder explicitly
  path: "/opt/prefect/data_workers"

  # Crucial configuration for local process execution:
  job_variables:
    working_dir: "/opt/prefect/data_workers"
    env:
      PYTHONPATH: "/opt/prefect/data_workers"
  
  # Define your default parameters here (e.g. for fetch_data)
  parameters:
    target_date: null # If null, our script defaults to today/yesterday
  
  # Schedule it to run daily at 7:00 AM (07:00)
  schedule:
    cron: "0 7 * * *"
    timezone: "Europe/Warsaw"